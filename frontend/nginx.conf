# HTTP — serve ACME challenges for certbot renewal, redirect everything else to HTTPS
server {
    listen 80;
    server_name findbestrentals.com www.findbestrentals.com;

    # Certbot webroot challenge (used for certificate renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://findbestrentals.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name findbestrentals.com www.findbestrentals.com;

    ssl_certificate     /etc/letsencrypt/live/findbestrentals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/findbestrentals.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Proxy /api/* to the backend container
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy /docs and /openapi.json (FastAPI swagger)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # Serve React static files
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets - short cache for JS/CSS (versioned by webpack), long for images
    location ~* \.(js|css)$ {
        root    /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
