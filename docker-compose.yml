# Local Development Docker Compose
# Frontend runs natively outside Docker for faster hot reload
# Usage: docker compose up -d

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: samepagedating_postgres
    environment:
      POSTGRES_USER: samepagedating
      POSTGRES_PASSWORD: samepagedating_dev_password
      POSTGRES_DB: samepagedating
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samepagedating"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: samepagedating_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: samepagedating_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./scripts:/scripts
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://samepagedating:samepagedating_dev_password@postgres:5432/samepagedating
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - APP_MODE=active_beta
      - SECRET_KEY=dev_secret_key_change_in_production_minimum_32_chars
      - CORS_ORIGINS=["http://localhost:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery services removed - not needed for initial dating app features
  # Can be added later for background tasks like:
  # - Sending match notifications
